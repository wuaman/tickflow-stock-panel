# Phase 0 单 service:FastAPI 启动后既跑 API 又托管前端 dist。
# 见 ADR-17 / §8.1。
#
# 可选 sidecar: financial-shim (东方财富财报适配层)。
# 仅当用户配置了 eastmoney 自定义财务源时才需要; 未配置该数据源时可忽略。
# 见 docs/examples/custom-financial-source/README.md。
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_EXTRAS: ${BACKEND_EXTRAS:-}
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.144.3}
    container_name: TickFlow_Stock_Panel
    ports:
      - "${PORT:-3018}:3018"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # 强制固定为容器内绝对路径, 防止 .env 里的 DATA_DIR=./data(开发模式用)
      # 被 env_file 原样传入容器后按错误的相对路径解析, 写到未挂载卷的目录,
      # 导致每次 up --build 重建容器都丢数据。environment 优先级高于 env_file,
      # 无论 .env 怎么写这里都以容器路径为准。
      - DATA_DIR=/app/data
      # 将主机 Codex Desktop 的 loopback local-access 端点映射到 Docker host gateway。
      - CODEX_DOCKER_HOST=host.docker.internal
    volumes:
      - ./data:/app/data
      - ./tiers.yaml:/app/tiers.yaml:ro
      # 复用主机 Codex 登录态；后端只读后复制到单次请求的临时 CODEX_HOME。
      # Windows PowerShell/CMD 下 HOME 常未设置, 可通过 .env 里 CODEX_HOME_HOST 覆盖。
      - ${CODEX_HOME_HOST:-${HOME}/.codex}:/root/.codex:ro
    restart: unless-stopped

  # 东方财富 datacenter 财报适配层 (可选 sidecar)。
  # 复用 app 镜像 (已含 app.plugins.eastmoney_shim 模块), 通过 network_mode: service:app
  # 共享 app 的网络命名空间, 故 app 容器内 http://127.0.0.1:3021 可直达, YAML 无需改 url。
  # depends_on 确保 app 先起 (shim 依赖其网络栈)。重启随 compose 自启, 不再需要手动 docker exec。
  financial-shim:
    image: tickflow-stock-panel-app
    container_name: TickFlow_FinancialShim
    network_mode: service:app
    depends_on:
      - app
    command:
      - uv
      - run
      - uvicorn
      - app.plugins.eastmoney_shim:app
      - --host
      - 127.0.0.1
      - --port
      - "3021"
    restart: unless-stopped

